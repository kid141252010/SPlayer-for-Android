name: ✨ 功能建议
description: 提出新的功能需求或改进想法
title: "[Feature] "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        ---
        感谢你的建议！请按以下模板填写，便于我们判断优先级与可行性。

        - 一个 Issue 只描述一个功能建议
        - 若建议与桌面端 / Web 端上游 SPlayer 无关，请在此仓库提；反之请去 [上游仓库](https://github.com/imsyy/SPlayer/issues)

  - type: checkboxes
    validations:
      required: true
    attributes:
      label: "检查清单"
      options:
        - label: "我已在 [Issues](../../issues?q=) 中搜索过，没有重复提交"
          required: true
        - label: "该建议是针对 **SPlayer for Android** 的，不是桌面端独有功能"
          required: true

  - type: textarea
    id: problem
    validations:
      required: true
    attributes:
      label: "要解决的问题 / 使用场景"
      description: 简述你遇到的痛点或触发此想法的场景
      placeholder: "例如：坐车时想用耳机线控切换歌单，当前耳机双击只能切歌"

  - type: textarea
    id: proposal
    validations:
      required: true
    attributes:
      label: "建议的方案"
      description: 期望的实现方式，UI / 交互 / 配置项等越具体越好
      placeholder: "例如：在 设置 → 播放 中新增「耳机三击切换歌单」开关"

  - type: textarea
    id: alternatives
    validations:
      required: false
    attributes:
      label: "备选方案 (选填)"
      description: 你考虑过的其他做法，以及为什么不优先这些

  - type: textarea
    id: extra
    validations:
      required: false
    attributes:
      label: "补充信息 (选填)"
      description: 参考实现、截图、其他软件的同类功能等
