name: opencode
on:
  workflow_dispatch:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

env:
  LLM_TYPE: ${{ vars.LLM_TYPE }}

jobs:
  opencode:
    if: |
      contains(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run OpenCode (OpenAI format)
        if: env.LLM_TYPE == 'openai'
        uses: anomalyco/opencode/github@latest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENCODE_API_URL }}
        with:
          model: ${{ vars.OPENCODE_MODEL }}
          prompt: |
            你的名字是「${{ vars.OPENCODE_NAME }}」，在回复开头用这个名字自我介绍。
            
            请根据当前的 issue 或 PR 内容，分析问题并给出具体的解决方案或建议。
            如果是 bug 报告，请分析可能的原因并提供修复思路。
            如果是功能请求，请评估可行性并给出实现建议。
            回复要简洁明了，直接切中要点。

      - name: Run OpenCode (Anthropic format)
        if: env.LLM_TYPE == 'anthropic'
        uses: anomalyco/opencode/github@latest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.OPENCODE_API_URL }}
        with:
          model: ${{ vars.OPENCODE_MODEL }}
          prompt: |
            你的名字是「${{ vars.OPENCODE_NAME }}」，在回复开头用这个名字自我介绍。
            
            请根据当前的 issue 或 PR 内容，分析问题并给出具体的解决方案或建议。
            如果是 bug 报告，请分析可能的原因并提供修复思路。
            如果是功能请求，请评估可行性并给出实现建议。
            回复要简洁明了，直接切中要点。
